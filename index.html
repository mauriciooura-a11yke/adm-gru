<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atendimento — Departamento Administrativo | EFLCH Guarulhos</title>
<style>
  :root{
    --azul-unifesp: #0b3d63;
    --azul-claro: #1c6ea4;
    --fundo: #f2f5f7;
    --branco: #ffffff;
    --texto: #1b2733;
    --texto-suave: #5b6b78;
    --linha: #dde4ea;
    --verde: #1f7a4d;
    --verde-fundo: #e6f4ec;
    --amarelo: #9a6b00;
    --amarelo-fundo: #fdf3dc;
    --vermelho: #a3392c;
    --vermelho-fundo: #fbe9e6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    background:var(--fundo);
    color:var(--texto);
  }
  header{
    background: linear-gradient(120deg, var(--azul-unifesp), var(--azul-claro));
    color:#fff;
    padding: 28px 24px 24px;
  }
  header .faixa{
    max-width:1100px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  header .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    opacity:.8;
  }
  header h1{
    margin:2px 0 4px;
    font-size:26px;
    font-weight:650;
  }
  header p{
    margin:0;
    font-size:13.5px;
    opacity:.85;
  }
  #meta{
    max-width:1100px;
    margin:14px auto 0;
    padding:0 24px;
    font-size:12.5px;
    color:var(--texto-suave);
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  #controles{
    max-width:1100px;
    margin:16px auto 0;
    padding:0 24px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  #controles input{
    flex:1;
    min-width:220px;
    padding:10px 14px;
    border:1px solid var(--linha);
    border-radius:8px;
    font-size:14px;
    background:var(--branco);
  }
  #controles select{
    padding:10px 14px;
    border:1px solid var(--linha);
    border-radius:8px;
    font-size:14px;
    background:var(--branco);
    color:var(--texto);
  }
  #controles button#btnLimparFiltros{
    padding:10px 16px;
    border:1px solid var(--linha);
    border-radius:8px;
    font-size:13.5px;
    background:var(--branco);
    color:var(--texto-suave);
    cursor:pointer;
    white-space:nowrap;
  }
  #controles button#btnLimparFiltros:hover{
    border-color:var(--azul-claro);
    color:var(--azul-claro);
  }
  #setoresBotoes{
    max-width:1100px;
    margin:12px auto 0;
    padding:0 24px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip-setor{
    padding:6px 14px;
    border-radius:999px;
    border:1px solid var(--linha);
    background:var(--branco);
    color:var(--texto-suave);
    font-size:12.5px;
    cursor:pointer;
  }
  .chip-setor.ativo{
    background:var(--azul-unifesp);
    border-color:var(--azul-unifesp);
    color:#fff;
  }
  #resumoPresencial{
    max-width:1100px;
    margin:14px auto 0;
    padding:12px 24px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    font-size:13px;
    color:var(--texto-suave);
  }
  #resumoPresencial select{
    padding:7px 10px;
    border:1px solid var(--linha);
    border-radius:7px;
    font-size:13px;
    background:var(--branco);
    color:var(--texto);
  }
  #resumoTexto{
    color:var(--azul-unifesp);
    font-weight:600;
  }
  main{
    max-width:1100px;
    margin:20px auto 60px;
    padding:0 24px;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap:18px;
  }
  .card{
    background:var(--branco);
    border:1px solid var(--linha);
    border-radius:12px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .card-cabecalho{
    padding:14px 18px;
    background:var(--azul-unifesp);
    color:#fff;
  }
  .card-cabecalho h2{
    margin:0;
    font-size:16px;
    font-weight:600;
  }
  .card-cabecalho .setor-email{
    margin-top:2px;
    font-size:12px;
    opacity:.85;
  }
  .card-cabecalho .setor-email a{
    color:inherit;
    text-decoration:none;
  }
  .card-cabecalho .setor-email a:hover{
    text-decoration:underline;
  }
  .servidor{
    padding:14px 18px;
    border-top:1px solid var(--linha);
  }
  .servidor:first-of-type{ border-top:none; }
  .servidor .linha-topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }
  .servidor .nome{
    font-weight:600;
    font-size:14.5px;
  }
  .badge{
    font-size:11px;
    font-weight:600;
    padding:3px 9px;
    border-radius:999px;
    white-space:nowrap;
  }
  .badge.servico{ color:var(--verde); background:var(--verde-fundo); }
  .badge.ferias{ color:var(--amarelo); background:var(--amarelo-fundo); }
  .badge.afastado{ color:var(--vermelho); background:var(--vermelho-fundo); }
  .detalhe{
    font-size:12.5px;
    color:var(--texto-suave);
    line-height:1.5;
  }
  .detalhe b{ color:var(--texto); font-weight:600; }
  .contato{
    margin-top:6px;
    font-size:12px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    color:var(--azul-claro);
  }
  .contato a{ color:inherit; text-decoration:none; }
  .contato a:hover{ text-decoration:underline; }
  #vazio{
    max-width:1100px;
    margin:60px auto;
    text-align:center;
    color:var(--texto-suave);
    font-size:14px;
  }
  footer{
    text-align:center;
    font-size:11.5px;
    color:var(--texto-suave);
    padding:0 24px 40px;
  }

  @media (max-width: 640px){
    header{ padding:20px 16px 18px; }
    header h1{ font-size:21px; }
    header p{ font-size:13px; }
    #meta{ padding:0 16px; flex-direction:column; gap:2px; }
    #controles{ padding:0 16px; flex-direction:column; }
    #controles input, #controles select, #controles button#btnLimparFiltros{ width:100%; }
    #setoresBotoes{ padding:0 16px; }
    #resumoPresencial{ padding:10px 16px; flex-direction:column; align-items:flex-start; }
    main{ padding:0 16px; grid-template-columns:1fr; gap:14px; }
    .card-cabecalho{ padding:12px 14px; }
    .servidor{ padding:12px 14px; }
    .linha-topo{ flex-wrap:wrap; gap:6px; }
  }

  @media (max-width: 380px){
    header h1{ font-size:19px; }
    .nome{ font-size:13.5px; }
    .badge{ font-size:10.5px; padding:2px 7px; }
  }
</style>
</head>
<body>

<header>
  <div class="faixa">
    <span class="eyebrow">EFLCH · Campus Guarulhos · Unifesp</span>
    <h1>Atendimento do Departamento Administrativo</h1>
    <p>Situação atual e horários de atendimento por setor</p>
  </div>
</header>

<div id="meta"></div>

<div id="controles">
  <input id="busca" type="text" placeholder="Buscar setor ou servidor…">
  <select id="filtroSituacao">
    <option value="">Todas as situações</option>
  </select>
  <button id="btnLimparFiltros" type="button">Limpar filtros</button>
</div>

<div id="setoresBotoes"></div>

<div id="resumoPresencial">
  <span>Atendimento presencial em:</span>
  <select id="filtroDiaResumo"></select>
  <span id="resumoTexto"></span>
</div>

<main id="cards"></main>
<div id="vazio" style="display:none">Nenhum resultado para essa busca.</div>

<footer>Dados publicados a partir da planilha de gestão do Departamento Administrativo.</footer>

<script>
// Dados de exemplo — usados apenas se dados.json ainda não existir/não puder ser lido.
const DADOS_EXEMPLO = {
  atualizado_em: null,
  setores: [
    {
      nome: "Almoxarifado",
      email_setor: "almoxarifado.guarulhos@unifesp.br",
      servidores: [
        { nome: "Marleide", situacao: "Em serviço", dias_presenciais: "Seg, Qua, Qui - 08h às 17h", dias_teletrabalho: "Ter, Sex - 08h às 17h", contato_chat: "marleide.silva@unifesp.br", ramal: "6138" },
        { nome: "Michele", situacao: "Em serviço", dias_presenciais: "Seg, Qua, Qui - 08h às 17h", dias_teletrabalho: "Ter, Sex - 08h às 17h", contato_chat: "michele.lopes@unifesp.br", ramal: "6138" }
      ]
    },
    {
      nome: "Compras",
      email_setor: "compras.guarulhos@unifesp.br",
      servidores: [
        { nome: "Rogério", situacao: "Em serviço", dias_presenciais: "Qua, Qui", dias_teletrabalho: "Seg, Ter", contato_chat: "rogerio.yoshida@unifesp.br", ramal: "6131" },
        { nome: "Viviane", situacao: "Férias", dias_presenciais: "Qua, Qui", dias_teletrabalho: "Seg, Ter", contato_chat: "sayuri.viviane@unifesp.br", ramal: "6132" }
      ]
    }
  ]
};

function classeBadge(situacao){
  const s = (situacao||'').toLowerCase();
  if (s.includes('serviço') || s.includes('servico')) return 'servico';
  if (s.includes('férias') || s.includes('ferias')) return 'ferias';
  return 'afastado';
}

function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function normalizarTexto(texto){
  return String(texto || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

let setorSelecionado = null;

function renderizar(dados){
  const main = document.getElementById('cards');
  const vazio = document.getElementById('vazio');
  const busca = normalizarTexto(document.getElementById('busca').value.trim());
  const filtroSit = document.getElementById('filtroSituacao').value;

  main.innerHTML = '';
  let algumResultado = false;

  const setoresOrdenados = [...dados.setores].sort((a, b) => normalizarTexto(a.nome).localeCompare(normalizarTexto(b.nome)));

  setoresOrdenados.forEach(setor => {
    if (setorSelecionado && setor.nome !== setorSelecionado) return;

    const servidoresFiltrados = setor.servidores
      .filter(sv => {
        const bateBusca = !busca || normalizarTexto(setor.nome).includes(busca) || normalizarTexto(sv.nome).includes(busca);
        const bateSit = !filtroSit || sv.situacao === filtroSit;
        return bateBusca && bateSit;
      })
      .sort((a, b) => normalizarTexto(a.nome).localeCompare(normalizarTexto(b.nome)));

    if (servidoresFiltrados.length === 0) return;
    algumResultado = true;

    const card = document.createElement('div');
    card.className = 'card';

    const h2 = document.createElement('h2');
    h2.textContent = setor.nome;

    const cabecalho = document.createElement('div');
    cabecalho.className = 'card-cabecalho';
    cabecalho.appendChild(h2);
    if (setor.email_setor) {
      const emailEl = document.createElement('div');
      emailEl.className = 'setor-email';
      emailEl.innerHTML = `<a href="mailto:${escapeHtml(setor.email_setor)}">${escapeHtml(setor.email_setor)}</a>`;
      cabecalho.appendChild(emailEl);
    }
    card.appendChild(cabecalho);

    servidoresFiltrados.forEach(sv => {
      const div = document.createElement('div');
      div.className = 'servidor';
      div.innerHTML = `
        <div class="linha-topo">
          <span class="nome">${escapeHtml(sv.nome)}</span>
          <span class="badge ${classeBadge(sv.situacao)}">${escapeHtml(sv.situacao)}</span>
        </div>
        <div class="detalhe">
          ${sv.dias_presenciais ? `<b>Presencial:</b> ${escapeHtml(sv.dias_presenciais)}<br>` : ''}
          ${sv.dias_teletrabalho ? `<b>Teletrabalho:</b> ${escapeHtml(sv.dias_teletrabalho)}` : ''}
        </div>
        <div class="contato">
          ${sv.contato_chat ? `<a href="mailto:${escapeHtml(sv.contato_chat)}">${escapeHtml(sv.contato_chat)}</a>` : ''}
          ${sv.ramal ? `<span>Ramal ${escapeHtml(sv.ramal)}</span>` : ''}
        </div>
      `;
      card.appendChild(div);
    });

    main.appendChild(card);
  });

  vazio.style.display = algumResultado ? 'none' : 'block';
}

function renderBotoesSetor(dados){
  const container = document.getElementById('setoresBotoes');
  container.innerHTML = '';

  const btnTodos = document.createElement('button');
  btnTodos.type = 'button';
  btnTodos.className = 'chip-setor' + (!setorSelecionado ? ' ativo' : '');
  btnTodos.textContent = 'Todos os setores';
  btnTodos.addEventListener('click', () => {
    setorSelecionado = null;
    renderBotoesSetor(dados);
    renderizar(dados);
  });
  container.appendChild(btnTodos);

  const nomesOrdenados = [...dados.setores].sort((a, b) => normalizarTexto(a.nome).localeCompare(normalizarTexto(b.nome)));
  nomesOrdenados.forEach(setor => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'chip-setor' + (setorSelecionado === setor.nome ? ' ativo' : '');
    btn.textContent = setor.nome;
    btn.addEventListener('click', () => {
      setorSelecionado = (setorSelecionado === setor.nome) ? null : setor.nome;
      renderBotoesSetor(dados);
      renderizar(dados);
    });
    container.appendChild(btn);
  });
}

const DIAS_UTEIS = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];

function diaAtualDentreUteis(){
  const nomes = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
  const hoje = nomes[new Date().getDay()];
  return DIAS_UTEIS.includes(hoje) ? hoje : 'Segunda';
}

function popularFiltroDiaResumo(){
  const select = document.getElementById('filtroDiaResumo');
  select.innerHTML = DIAS_UTEIS.map(d => `<option value="${d}">${d}</option>`).join('');
  select.value = diaAtualDentreUteis();
}

function diaEstaNaLista(diasPresenciaisStr, dia){
  if (!diasPresenciaisStr) return false;
  return diasPresenciaisStr.split(';').some(parte => parte.trim().startsWith(dia + ' -'));
}

function atualizarResumoPresencial(dados){
  const dia = document.getElementById('filtroDiaResumo').value;
  const setoresComPresencial = new Set();
  let totalServidores = 0;

  dados.setores.forEach(setor => {
    setor.servidores.forEach(sv => {
      if (diaEstaNaLista(sv.dias_presenciais, dia)) {
        setoresComPresencial.add(setor.nome);
        totalServidores++;
      }
    });
  });

  const texto = totalServidores === 0
    ? 'Nenhum servidor com atendimento presencial registrado nesse dia.'
    : totalServidores + ' servidor(es) em ' + setoresComPresencial.size + ' setor(es).';
  document.getElementById('resumoTexto').textContent = texto;
}

function popularFiltroSituacao(dados){
  const select = document.getElementById('filtroSituacao');
  const situacoes = new Set();
  dados.setores.forEach(s => s.servidores.forEach(sv => situacoes.add(sv.situacao)));
  [...situacoes].sort().forEach(sit => {
    const opt = document.createElement('option');
    opt.value = sit;
    opt.textContent = sit;
    select.appendChild(opt);
  });
}

function atualizarMeta(dados, fonte){
  const meta = document.getElementById('meta');
  const total = dados.setores.reduce((acc, s) => acc + s.servidores.length, 0);
  const quando = dados.atualizado_em ? new Date(dados.atualizado_em).toLocaleString('pt-BR') : '—';
  meta.innerHTML = `<span>${dados.setores.length} setores · ${total} servidores</span><span>Atualizado em: ${quando}${fonte === 'exemplo' ? ' (dados de exemplo)' : ''}</span>`;
}

let DADOS_ATUAIS = null;

async function carregar(){
  try{
    const resp = await fetch('dados.json', { cache: 'no-store' });
    if(!resp.ok) throw new Error('sem dados.json');
    DADOS_ATUAIS = await resp.json();
    atualizarMeta(DADOS_ATUAIS, 'real');
  }catch(e){
    DADOS_ATUAIS = DADOS_EXEMPLO;
    atualizarMeta(DADOS_ATUAIS, 'exemplo');
  }
  popularFiltroSituacao(DADOS_ATUAIS);
  renderBotoesSetor(DADOS_ATUAIS);
  popularFiltroDiaResumo();
  atualizarResumoPresencial(DADOS_ATUAIS);
  renderizar(DADOS_ATUAIS);
}

document.getElementById('busca').addEventListener('input', () => renderizar(DADOS_ATUAIS));
document.getElementById('filtroSituacao').addEventListener('change', () => renderizar(DADOS_ATUAIS));
document.getElementById('filtroDiaResumo').addEventListener('change', () => atualizarResumoPresencial(DADOS_ATUAIS));
document.getElementById('btnLimparFiltros').addEventListener('click', () => {
  document.getElementById('busca').value = '';
  document.getElementById('filtroSituacao').value = '';
  setorSelecionado = null;
  renderBotoesSetor(DADOS_ATUAIS);
  renderizar(DADOS_ATUAIS);
});

carregar();
</script>
</body>
</html>
